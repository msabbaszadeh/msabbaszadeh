<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 420" role="img" aria-label="Multi-agent AI orchestration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1100" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#05070f"/>
      <stop offset="100%" stop-color="#140a28"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#151b2b"/>
      <stop offset="100%" stop-color="#0b101a"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1100" height="420" rx="16" fill="url(#bg)"/>
  <rect x="1" y="1" width="1098" height="418" rx="15" fill="none" stroke="#312e81" stroke-width="1"/>

  <text x="550" y="36" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#e5e7eb">Multi-Agent Orchestration</text>
  <text x="550" y="58" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#9ca3af">CrewAI / LangChain / MCP - autonomous agent workflows in production</text>

  <!-- orchestrator -->
  <g transform="translate(550 115)" filter="url(#glow)">
    <rect x="-110" y="-42" width="220" height="84" rx="16" fill="url(#card)" stroke="#22d3ee" stroke-width="2"/>
    <!-- hub icon -->
    <circle cx="-70" cy="0" r="22" fill="#0a0e17" stroke="#22d3ee" stroke-width="2"/>
    <circle cx="-70" cy="0" r="6" fill="#22d3ee"/>
    <line x1="-70" y1="-14" x2="-70" y2="-22" stroke="#22d3ee" stroke-width="2"/>
    <line x1="-70" y1="14" x2="-70" y2="22" stroke="#22d3ee" stroke-width="2"/>
    <line x1="-84" y1="0" x2="-92" y2="0" stroke="#22d3ee" stroke-width="2"/>
    <line x1="-56" y1="0" x2="-48" y2="0" stroke="#22d3ee" stroke-width="2"/>
    <text x="20" y="-8" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#22d3ee">ORCHESTRATOR</text>
    <text x="20" y="12" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#9ca3af">Planner / Router / Memory</text>
  </g>

  <!-- agent card helper via groups -->
  <!-- Research Agent -->
  <g transform="translate(180 265)" filter="url(#glow)">
    <rect x="-95" y="-70" width="190" height="140" rx="14" fill="url(#card)" stroke="#f472b6" stroke-width="2"/>
    <!-- robot icon -->
    <rect x="-22" y="-58" width="44" height="38" rx="10" fill="#0a0e17" stroke="#f472b6" stroke-width="2"/>
    <circle cx="-10" cy="-46" r="4" fill="#f472b6"/>
    <circle cx="10" cy="-46" r="4" fill="#f472b6"/>
    <rect x="-8" y="-34" width="16" height="5" rx="2" fill="#f472b6"/>
    <line x1="0" y1="-58" x2="0" y2="-66" stroke="#f472b6" stroke-width="2"/>
    <circle cx="0" cy="-68" r="3" fill="#f472b6"/>
    <!-- magnifier -->
    <circle cx="18" cy="-50" r="7" fill="none" stroke="#f472b6" stroke-width="1.5"/>
    <line x1="23" y1="-45" x2="28" y2="-40" stroke="#f472b6" stroke-width="1.5"/>
    <text y="8" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#f472b6">RESEARCH AGENT</text>
    <text y="28" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#d1d5db">RAG retrieval</text>
    <text y="44" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#9ca3af">Vector search / docs</text>
  </g>

  <!-- Executor Agent -->
  <g transform="translate(550 265)" filter="url(#glow)">
    <rect x="-95" y="-70" width="190" height="140" rx="14" fill="url(#card)" stroke="#a855f7" stroke-width="2"/>
    <rect x="-22" y="-58" width="44" height="38" rx="10" fill="#0a0e17" stroke="#a855f7" stroke-width="2"/>
    <circle cx="-10" cy="-46" r="4" fill="#a855f7"/>
    <circle cx="10" cy="-46" r="4" fill="#a855f7"/>
    <rect x="-8" y="-34" width="16" height="5" rx="2" fill="#a855f7"/>
    <!-- code brackets -->
    <text x="22" y="-42" font-family="monospace" font-size="16" font-weight="700" fill="#a855f7">{ }</text>
    <text y="8" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#a855f7">EXECUTOR AGENT</text>
    <text y="28" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#d1d5db">Tool calling</text>
    <text y="44" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#9ca3af">API / SQL / Python</text>
  </g>

  <!-- Critic Agent -->
  <g transform="translate(920 265)" filter="url(#glow)">
    <rect x="-95" y="-70" width="190" height="140" rx="14" fill="url(#card)" stroke="#34d399" stroke-width="2"/>
    <rect x="-22" y="-58" width="44" height="38" rx="10" fill="#0a0e17" stroke="#34d399" stroke-width="2"/>
    <circle cx="-10" cy="-46" r="4" fill="#34d399"/>
    <circle cx="10" cy="-46" r="4" fill="#34d399"/>
    <rect x="-8" y="-34" width="16" height="5" rx="2" fill="#34d399"/>
    <!-- shield check -->
    <path d="M18 -58 L26 -52 L26 -44 C26 -38 18 -34 18 -34 C18 -34 10 -38 10 -44 L10 -52 Z" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <path d="M14 -44 L17 -41 L23 -48" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <text y="8" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#34d399">CRITIC AGENT</text>
    <text y="28" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#d1d5db">Validation</text>
    <text y="44" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#9ca3af">Guardrails / QA loop</text>
  </g>

  <!-- tool layer -->
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="120" y="350" width="220" height="44" rx="10" fill="#0a0e17" stroke="#22d3ee" stroke-opacity="0.5"/>
    <rect x="440" y="350" width="220" height="44" rx="10" fill="#0a0e17" stroke="#a855f7" stroke-opacity="0.5"/>
    <rect x="760" y="350" width="220" height="44" rx="10" fill="#0a0e17" stroke="#34d399" stroke-opacity="0.5"/>
    <text x="230" y="378" text-anchor="middle" font-size="11" fill="#22d3ee">Qdrant / Pinecone</text>
    <text x="550" y="378" text-anchor="middle" font-size="11" fill="#a855f7">LLM / SLM (vLLM)</text>
    <text x="870" y="378" text-anchor="middle" font-size="11" fill="#34d399">MCP Tool Layer</text>
  </g>

  <!-- connectors -->
  <g fill="none" stroke-width="2" stroke-opacity="0.75">
    <path d="M550 157 L550 185 L180 195 L180 195" stroke="#f472b6"/>
    <path d="M550 157 L550 195" stroke="#a855f7"/>
    <path d="M550 157 L550 185 L920 195 L920 195" stroke="#34d399"/>
    <path d="M180 335 L230 350" stroke="#22d3ee"/>
    <path d="M550 335 L550 350" stroke="#a855f7"/>
    <path d="M920 335 L870 350" stroke="#34d399"/>
  </g>

  <!-- arrow heads -->
  <polygon points="550,192 545,182 555,182" fill="#a855f7"/>
  <polygon points="178,200 188,195 188,205" fill="#f472b6"/>
  <polygon points="922,200 912,195 912,205" fill="#34d399"/>
</svg>
