<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 380" role="img" aria-label="Agentic AI multi-agent orchestration">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050810"/>
      <stop offset="100%" stop-color="#12082a"/>
    </linearGradient>
    <linearGradient id="flow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="50%" stop-color="#bf00ff"/>
      <stop offset="100%" stop-color="#00ff88"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="980" height="380" rx="18" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="977" height="377" rx="16" fill="none" stroke="#bf00ff" stroke-opacity="0.4" stroke-width="2"/>

  <text x="490" y="36" text-anchor="middle" font-family="monospace" font-size="16" font-weight="700" fill="#bf00ff" letter-spacing="3">AGENTIC AI ORCHESTRATION</text>
  <text x="490" y="56" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e" letter-spacing="2">CrewAI  /  LangChain  /  MCP  /  AUTONOMOUS WORKFLOWS</text>

  <!-- orchestrator hub -->
  <g transform="translate(490 115)" filter="url(#glow)">
    <rect x="-95" y="-32" width="190" height="64" rx="12" fill="#0a0e17" stroke="#00f5ff" stroke-width="2"/>
    <text y="-6" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#00f5ff">ORCHESTRATOR</text>
    <text y="14" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">Planner / Router / Memory</text>
  </g>

  <!-- agents row -->
  <g filter="url(#glow)">
    <g transform="translate(170 230)">
      <rect x="-72" y="-38" width="144" height="76" rx="10" fill="#0a0e17" stroke="#ff006e" stroke-width="1.5"/>
      <text y="-10" text-anchor="middle" font-family="monospace" font-size="12" font-weight="700" fill="#ff006e">RESEARCH AGENT</text>
      <text y="10" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">RAG / Retrieval</text>
      <text y="24" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">Vector Search</text>
    </g>
    <g transform="translate(490 230)">
      <rect x="-72" y="-38" width="144" height="76" rx="10" fill="#0a0e17" stroke="#bf00ff" stroke-width="1.5"/>
      <text y="-10" text-anchor="middle" font-family="monospace" font-size="12" font-weight="700" fill="#bf00ff">EXECUTOR AGENT</text>
      <text y="10" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">Tool Calling</text>
      <text y="24" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">API / Code / SQL</text>
    </g>
    <g transform="translate(810 230)">
      <rect x="-72" y="-38" width="144" height="76" rx="10" fill="#0a0e17" stroke="#00ff88" stroke-width="1.5"/>
      <text y="-10" text-anchor="middle" font-family="monospace" font-size="12" font-weight="700" fill="#00ff88">CRITIC AGENT</text>
      <text y="10" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">Validation</text>
      <text y="24" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">Quality / Guardrails</text>
    </g>
  </g>

  <!-- tools / infra row -->
  <g>
    <g transform="translate(245 340)">
      <rect x="-55" y="-22" width="110" height="44" rx="8" fill="#0d1117" stroke="#00f5ff" stroke-width="1" stroke-opacity="0.6"/>
      <text y="5" text-anchor="middle" font-family="monospace" font-size="10" fill="#00f5ff">Qdrant / Pinecone</text>
    </g>
    <g transform="translate(490 340)">
      <rect x="-55" y="-22" width="110" height="44" rx="8" fill="#0d1117" stroke="#bf00ff" stroke-width="1" stroke-opacity="0.6"/>
      <text y="5" text-anchor="middle" font-family="monospace" font-size="10" fill="#bf00ff">LLM / SLM</text>
    </g>
    <g transform="translate(735 340)">
      <rect x="-55" y="-22" width="110" height="44" rx="8" fill="#0d1117" stroke="#00ff88" stroke-width="1" stroke-opacity="0.6"/>
      <text y="5" text-anchor="middle" font-family="monospace" font-size="10" fill="#00ff88">MCP Tools</text>
    </g>
  </g>

  <!-- flow lines -->
  <g stroke="url(#flow)" stroke-width="1.5" fill="none" stroke-opacity="0.7">
    <path d="M490 147 L490 175 L170 192 L170 192"/>
    <path d="M490 147 L490 192"/>
    <path d="M490 147 L490 175 L810 192"/>
    <path d="M170 268 L245 318"/>
    <path d="M490 268 L490 318"/>
    <path d="M810 268 L735 318"/>
  </g>

  <!-- pulse signals -->
  <circle cx="490" cy="165" r="4" fill="#00f5ff" filter="url(#glow)"><animate attributeName="cy" values="147;192;147" dur="2.5s" repeatCount="indefinite"/></circle>
  <circle cx="330" cy="210" r="3" fill="#bf00ff" filter="url(#glow)"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.6s" repeatCount="indefinite"/></circle>
  <circle cx="650" cy="210" r="3" fill="#00ff88" filter="url(#glow)"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.9s" repeatCount="indefinite"/></circle>
</svg>
