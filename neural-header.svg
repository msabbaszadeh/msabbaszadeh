<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 300" role="img" aria-label="Neural network architecture">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1100" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#04060d"/>
      <stop offset="100%" stop-color="#0f0a24"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#121826"/>
      <stop offset="100%" stop-color="#0a0e17"/>
    </linearGradient>
    <linearGradient id="wire" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1100" height="300" rx="16" fill="url(#bg)"/>
  <rect x="1" y="1" width="1098" height="298" rx="15" fill="none" stroke="#1f2937" stroke-width="1"/>

  <text x="550" y="34" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#e5e7eb">Neural Inference Pipeline</text>
  <text x="550" y="54" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#9ca3af">From raw signals to production predictions</text>

  <!-- panels -->
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="40" y="80" width="200" height="170" rx="14" fill="url(#panel)" stroke="#22d3ee" stroke-opacity="0.35"/>
    <rect x="280" y="80" width="220" height="170" rx="14" fill="url(#panel)" stroke="#a855f7" stroke-opacity="0.35"/>
    <rect x="540" y="80" width="220" height="170" rx="14" fill="url(#panel)" stroke="#a855f7" stroke-opacity="0.35"/>
    <rect x="800" y="80" width="260" height="170" rx="14" fill="url(#panel)" stroke="#34d399" stroke-opacity="0.35"/>

    <text x="140" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#22d3ee">INPUT LAYER</text>
    <text x="390" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#c084fc">HIDDEN LAYER 1</text>
    <text x="650" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#c084fc">HIDDEN LAYER 2</text>
    <text x="930" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#34d399">OUTPUT</text>
  </g>

  <!-- nodes input -->
  <g filter="url(#glow)">
    <circle cx="100" cy="145" r="11" fill="#0a0e17" stroke="#22d3ee" stroke-width="2"/>
    <circle cx="140" cy="130" r="11" fill="#0a0e17" stroke="#22d3ee" stroke-width="2"/>
    <circle cx="180" cy="155" r="11" fill="#0a0e17" stroke="#22d3ee" stroke-width="2"/>
    <circle cx="120" cy="190" r="11" fill="#0a0e17" stroke="#22d3ee" stroke-width="2"/>
    <circle cx="170" cy="210" r="11" fill="#0a0e17" stroke="#22d3ee" stroke-width="2"/>
  </g>

  <!-- hidden 1 -->
  <g filter="url(#glow)">
    <circle cx="320" cy="135" r="10" fill="#0a0e17" stroke="#a855f7" stroke-width="2"/>
    <circle cx="360" cy="160" r="10" fill="#0a0e17" stroke="#a855f7" stroke-width="2"/>
    <circle cx="400" cy="130" r="10" fill="#0a0e17" stroke="#a855f7" stroke-width="2"/>
    <circle cx="440" cy="170" r="10" fill="#0a0e17" stroke="#a855f7" stroke-width="2"/>
    <circle cx="380" cy="205" r="10" fill="#0a0e17" stroke="#a855f7" stroke-width="2"/>
    <circle cx="420" cy="215" r="10" fill="#0a0e17" stroke="#a855f7" stroke-width="2"/>
  </g>

  <!-- hidden 2 -->
  <g filter="url(#glow)">
    <circle cx="580" cy="140" r="10" fill="#0a0e17" stroke="#a855f7" stroke-width="2"/>
    <circle cx="620" cy="165" r="10" fill="#0a0e17" stroke="#a855f7" stroke-width="2"/>
    <circle cx="660" cy="135" r="10" fill="#0a0e17" stroke="#a855f7" stroke-width="2"/>
    <circle cx="700" cy="175" r="10" fill="#0a0e17" stroke="#a855f7" stroke-width="2"/>
    <circle cx="640" cy="210" r="10" fill="#0a0e17" stroke="#a855f7" stroke-width="2"/>
  </g>

  <!-- output -->
  <g filter="url(#glow)">
    <circle cx="880" cy="155" r="13" fill="#0a0e17" stroke="#34d399" stroke-width="2.5"/>
    <circle cx="930" cy="180" r="13" fill="#0a0e17" stroke="#34d399" stroke-width="2.5"/>
    <circle cx="980" cy="150" r="13" fill="#0a0e17" stroke="#34d399" stroke-width="2.5"/>
  </g>

  <!-- synapses - clean curves -->
  <g fill="none" stroke="url(#wire)" stroke-width="1.2" opacity="0.9">
    <path d="M111 145 C180 145,220 135,320 135"/>
    <path d="M140 130 C210 130,250 160,360 160"/>
    <path d="M180 155 C250 155,290 130,400 130"/>
    <path d="M120 190 C200 190,240 170,440 170"/>
    <path d="M170 210 C240 210,280 205,380 205"/>
    <path d="M330 135 C470 135,520 140,580 140"/>
    <path d="M360 160 C500 160,540 165,620 165"/>
    <path d="M400 130 C520 130,560 135,660 135"/>
    <path d="M440 170 C560 170,600 175,700 175"/>
    <path d="M380 205 C520 205,560 210,640 210"/>
    <path d="M590 140 C740 140,820 155,880 155"/>
    <path d="M620 165 C760 165,850 180,930 180"/>
    <path d="M660 135 C780 135,900 150,980 150"/>
  </g>

  <!-- flow arrows between panels -->
  <g fill="#6b7280" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">
    <text x="252" y="175">></text>
    <text x="512" y="175">></text>
    <text x="772" y="175">></text>
  </g>

  <!-- legend -->
  <g font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#9ca3af">
    <text x="140" y="235" text-anchor="middle">Raw features</text>
    <text x="390" y="235" text-anchor="middle">Non-linear transforms</text>
    <text x="650" y="235" text-anchor="middle">Representation learning</text>
    <text x="930" y="235" text-anchor="middle">Prediction / inference</text>
  </g>
</svg>
